name: PR Create

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - 'main'

permissions:
  pull-requests: write

jobs:
  pr-create:
    permissions:
      contents: read
      pull-requests: write
    name: PR create action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Label the PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/actions/labeler.yml
          sync-labels: true

      - name: Welcome new contributor
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👋 Hi! Thank you for contributing to the Triton Ascend project. The following points will speed up your PR merge:\n\n' +
                '- A PR should do only one thing, smaller PRs enable faster reviews.\n' +
                '- Every PR should include tests to ensure it works and is not broken by other future PRs.\n' +
                '- Write clear commit messages following the Conventional Commits format to help reviewers and future developers understand.\n\n' +
                'If CI fails, you can run linting and testing checks locally according to the contributing guidelines.'
            })
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
